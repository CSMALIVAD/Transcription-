<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>DNA Metabolism Master</title>

<style>
body {
    margin:0;
    font-family:Arial;
    background:#0b1020;
    color:white;
}

.container { display:flex; height:100vh; }

.sidebar {
    width:220px;
    background:#020617;
    padding:10px;
}

button {
    width:100%;
    margin:5px 0;
    padding:8px;
    background:#1e293b;
    color:white;
    border:none;
    cursor:pointer;
}

.main {
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
}

canvas { background:#020617; border:1px solid #334155; }

.controls { margin-top:10px; }
</style>
</head>

<body>

<div class="container">

<div class="sidebar">
<h3>Modes</h3>
<button onclick="setMode('transcription')">Transcription</button>
<button onclick="setMode('translation')">Translation</button>
<button onclick="setMode('exam')">Exam Diagram</button>
</div>

<div class="main">
<canvas id="c" width="900" height="500"></canvas>

<div class="controls">
<button onclick="play()">Play</button>
<button onclick="pause()">Pause</button>
<button onclick="reset()">Reset</button>
</div>
</div>

</div>

<script>
const ctx = c.getContext("2d");

let mode = "transcription";
let t = 0;
let running = false;

const dna = "ATGCGTACGTAGCTAG";

/* ---------- HELPERS ---------- */

function compRNA(b){
    return {A:"U",T:"A",G:"C",C:"G"}[b];
}

/* ---------- TRANSCRIPTION ---------- */

function drawTranscription(){
    ctx.fillText("Transcription (DNA → RNA)",50,50);

    // DNA
    for(let i=0;i<dna.length;i++){
        ctx.fillStyle="#38bdf8";
        ctx.fillText(dna[i],100+i*25,150);
    }

    // RNA growing
    ctx.fillStyle="#22c55e";
    for(let i=0;i<t/3;i++){
        ctx.fillText(compRNA(dna[i]),100+i*25,250);
    }

    // Polymerase
    ctx.fillStyle="#f97316";
    ctx.fillRect(100+(t/3)*25,120,20,30);

    ctx.fillText("RNA Polymerase",100+(t/3)*25,110);
}

/* ---------- TRANSLATION ---------- */

function drawTranslation(){
    ctx.fillText("Translation (mRNA → Protein)",50,50);

    // mRNA
    ctx.fillStyle="#22c55e";
    for(let i=0;i<dna.length;i++){
        ctx.fillText(compRNA(dna[i]),100+i*25,200);
    }

    // Ribosome
    ctx.fillStyle="#f97316";
    ctx.fillRect(100+(t/3)*25,170,40,40);

    // tRNA
    ctx.fillStyle="#38bdf8";
    ctx.fillText("tRNA",100+(t/3)*25,250);

    // Polypeptide chain
    ctx.fillStyle="#22c55e";
    for(let i=0;i<t/4;i++){
        ctx.fillText("●",100+i*15,300);
    }
}

/* ---------- EXAM DIAGRAM ---------- */

function drawExam(){
    ctx.fillText("DNA → RNA → Protein (Central Dogma)",50,50);

    // DNA
    ctx.fillStyle="#38bdf8";
    ctx.fillText("DNA",100,150);

    // Arrow
    ctx.fillText("↓ Transcription",100,200);

    // RNA
    ctx.fillStyle="#22c55e";
    ctx.fillText("RNA",100,250);

    ctx.fillText("↓ Translation",100,300);

    // Protein
    ctx.fillStyle="#f97316";
    ctx.fillText("Protein",100,350);

    // Side info
    ctx.fillStyle="#e2e8f0";
    ctx.fillText("Replication → DNA copies itself",300,150);
    ctx.fillText("Repair → fixes errors",300,200);
    ctx.fillText("Recombination → genetic exchange",300,250);
}

/* ---------- MAIN ---------- */

function draw(){
    ctx.clearRect(0,0,900,500);
    ctx.font="14px Arial";

    if(mode==="transcription") drawTranscription();
    if(mode==="translation") drawTranslation();
    if(mode==="exam") drawExam();
}

function loop(){
    if(!running) return;
    t++;
    draw();
    setTimeout(loop,50);
}

function play(){ running=true; loop(); }
function pause(){ running=false; }
function reset(){ running=false; t=0; draw(); }
function setMode(m){ mode=m; reset(); }

draw();
</script>

function play(){
    running = true;
    direction = 1;
    step();
}

function pause(){
    running = false;
}

function reverse(){
    running = true;
    direction = -1;
    step();
}

render();
</script>

</body>
</html>
