<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Advanced RNA Transcription Simulator</title>
<style>
body {
    background:#020617;
    color:white;
    font-family:Arial;
    text-align:center;
}
canvas {
    border:2px solid #38bdf8;
    margin-top:15px;
    background:#000814;
}
button, input {
    margin:5px;
    padding:8px;
    font-size:14px;
}
</style>
</head>
<body>

<h2>🧬 Advanced RNA Transcription Model</h2>

<button onclick="play()">▶ Play</button>
<button onclick="pause()">⏸ Pause</button>
<button onclick="reverse()">⏪ Reverse</button>

Speed: <input type="range" min="100" max="1000" value="400" id="speed">

<canvas id="c" width="1000" height="500"></canvas>

<script>
const dna = "ATGCGTACGTAGCTAGCTAGGCTA";
const exons = [0,1,2,6,7,8,15,16,17]; // exon positions
let rna = [];
let index = 0;
let running = false;
let direction = 1;

const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

function complement(b){
    return {A:"U",T:"A",G:"C",C:"G"}[b];
}

function drawDNA(){
    for(let i=0;i<dna.length;i++){
        ctx.fillStyle = exons.includes(i) ? "#22c55e" : "#ef4444"; // exon green, intron red
        ctx.fillText(dna[i], 50+i*30, 150);
    }
}

function drawRNA(){
    ctx.fillStyle="#38bdf8";
    for(let i=0;i<rna.length;i++){
        ctx.fillText(rna[i], 50+i*30, 300);
    }
}

function drawBubble(){
    ctx.strokeStyle="#facc15";
    ctx.beginPath();
    ctx.arc(65+index*30, 140, 40, 0, Math.PI*2);
    ctx.stroke();
}

function drawPolymerase(){
    ctx.fillStyle="#f97316";
    ctx.fillRect(50+index*30,100,40,30);
    ctx.fillText("Pol",55+index*30,120);
}

function drawLoop(){
    ctx.strokeStyle="#a78bfa";
    ctx.beginPath();
    ctx.moveTo(50+index*30,140);
    ctx.bezierCurveTo(200,50,400,450,700,150);
    ctx.stroke();
}

function render(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    drawDNA();
    drawRNA();
    drawBubble();
    drawPolymerase();
    drawLoop();
}

function step(){
    if(!running) return;

    if(index>=0 && index<dna.length){
        rna[index] = complement(dna[index]);
        index += direction;
    } else {
        running = false;
        spliceRNA();
        return;
    }

    render();
    setTimeout(step, document.getElementById("speed").value);
}

function spliceRNA(){
    // remove introns
    let spliced = [];
    for(let i=0;i<rna.length;i++){
        if(exons.includes(i)){
            spliced.push(rna[i]);
        }
    }

    rna = spliced;
    index = rna.length;

    render();

    ctx.fillStyle="#22c55e";
    ctx.fillText("Splicing Complete (Introns Removed)", 300, 400);
}

function play(){
    running = true;
    direction = 1;
    step();
}

function pause(){
    running = false;
}

function reverse(){
    running = true;
    direction = -1;
    step();
}

render();
</script>

</body>
</html>
