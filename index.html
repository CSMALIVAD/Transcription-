<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>DNA Scale Model</title>

<style>
body{
    margin:0;
    background:#0b1020;
    color:white;
    font-family:Arial;
    text-align:center;
}

canvas{
    background:#020617;
    border:1px solid #334155;
    margin-top:20px;
}

.info{
    margin-top:10px;
    font-size:14px;
}
</style>
</head>

<body>

<h2>🧬 DNA Metabolism (Scale Accurate Model)</h2>

<button onclick="play()">Play</button>
<button onclick="pause()">Pause</button>
<button onclick="reset()">Reset</button>

<canvas id="c" width="1200" height="600"></canvas>

<div class="info">
Scale: 1 nm = 3 px (adjustable)
</div>

<script>
const ctx = c.getContext("2d");

/* ===========================
   SCALE SYSTEM
=========================== */

const SCALE = 3; // 1 nm = 3 pixels

function nm(n){
    return n * SCALE;
}

/* ===========================
   REAL BIO SIZES (nm)
=========================== */

const SIZE = {
    dnaWidth: 2,
    polymerase: 12,
    ribosome: 25
};

/* ===========================
   DATA
=========================== */

const dna = "ATGCGTACGTAGCTAG";
let rna = [];
let protein = [];

let phase = "transcription";
let index = 0;
let codonIndex = 0;
let running = false;

/* ===========================
   COMPLEMENT
=========================== */

function rnaComp(b){
    return {A:"U",T:"A",G:"C",C:"G"}[b];
}

/* ===========================
   DRAW DNA (scaled)
=========================== */

function drawDNA(){
    ctx.fillText("DNA (2 nm width)",50,80);

    let height = nm(SIZE.dnaWidth);

    ctx.fillStyle="#38bdf8";

    ctx.fillRect(100,120,800,height);

    ctx.fillStyle="#06b6d4";
    ctx.fillRect(100,120+height+5,800,height);
}

/* ===========================
   RNA POLYMERASE
=========================== */

function drawPolymerase(){
    let size = nm(SIZE.polymerase);

    ctx.fillStyle="#f97316";
    ctx.beginPath();
    ctx.arc(100 + index*20,140,size/2,0,Math.PI*2);
    ctx.fill();

    ctx.fillText("RNA Polymerase (~12 nm)",100 + index*20 - 40,100);
}

/* ===========================
   RNA
=========================== */

function drawRNA(){
    ctx.fillStyle="#22c55e";

    for(let i=0;i<rna.length;i++){
        ctx.fillRect(100+i*20,200,10,10);
    }
}

/* ===========================
   RIBOSOME
=========================== */

function drawRibosome(){
    let size = nm(SIZE.ribosome);

    ctx.fillStyle="#f97316";
    ctx.beginPath();
    ctx.arc(100 + codonIndex*60,300,size/2,0,Math.PI*2);
    ctx.fill();

    ctx.fillText("Ribosome (~25 nm)",100 + codonIndex*60 - 40,260);
}

/* ===========================
   PROTEIN
=========================== */

function drawProtein(){
    ctx.fillStyle="#facc15";

    for(let i=0;i<protein.length;i++){
        ctx.fillRect(100+i*50,350,20,15);
    }
}

/* ===========================
   LOGIC
=========================== */

function step(){

    if(phase==="transcription"){
        if(index < dna.length){
            rna.push(rnaComp(dna[index]));
            index++;
        } else {
            phase="translation";
        }
    }

    else if(phase==="translation"){
        if(codonIndex*3 < rna.length){
            protein.push("AA");
            codonIndex++;
        }
    }
}

/* ===========================
   DRAW
=========================== */

function draw(){
    ctx.clearRect(0,0,1200,600);
    ctx.font="14px Arial";

    drawDNA();
    drawPolymerase();
    drawRNA();
    drawRibosome();
    drawProtein();

    ctx.fillText("Phase: "+phase,900,50);
}

/* ===========================
   LOOP
=========================== */

function loop(){
    if(!running) return;
    step();
    draw();
    setTimeout(loop,500);
}

function play(){ running=true; loop(); }
function pause(){ running=false; }
function reset(){
    running=false;
    rna=[]; protein=[];
    index=0; codonIndex=0;
    phase="transcription";
    draw();
}

draw();
</script>

</body>
</html>
